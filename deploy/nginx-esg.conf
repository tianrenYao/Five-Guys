# Nginx reverse-proxy site configuration for the ESG Management Platform.
#
# Place at: /etc/nginx/sites-available/esg
# Then enable with:
#     sudo ln -s /etc/nginx/sites-available/esg /etc/nginx/sites-enabled/esg
#     sudo rm -f /etc/nginx/sites-enabled/default
#     sudo nginx -t && sudo systemctl reload nginx
#
# Replace <VM_HOSTNAME> with your group's VM hostname provided by the TA.
# Replace <PROJECT_PATH> with the absolute path of the cloned repo on the VM
# (e.g. /home/student/Five-Guys).

server {
    listen 80;
    listen [::]:80;
    server_name <VM_HOSTNAME>;

    # Allow up to 16 MB uploads (matches Flask MAX_CONTENT_LENGTH).
    client_max_body_size 16M;

    # Serve static files (CSS / JS / images) directly from disk for speed.
    location /static/ {
        alias <PROJECT_PATH>/frontend/static/;
        access_log off;
        expires 7d;
    }

    # Forward everything else to the Gunicorn-managed Flask app on localhost.
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
